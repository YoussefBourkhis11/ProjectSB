<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Liste des Bulletins — SGE</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f9f9f9; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }
        h1 { color: #1e3a5f; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; background: #fff;
                box-shadow: 0 2px 8px rgba(0,0,0,.1); border-radius: 8px; overflow: hidden; }
        thead tr { background: #1e3a5f; color: #fff; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        tr.admis   { background: #d4edda; }
        tr.ajourné { background: #f8d7da; }
        tr:hover { opacity: .9; }
        .badge-admis   { background: #28a745; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: .85rem; }
        .badge-ajourné { background: #dc3545; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: .85rem; }
        .btn-voir { background: #1e3a5f; color: #fff; padding: 5px 12px; border-radius: 4px;
                    text-decoration: none; font-size: .85rem; }
        .btn-voir:hover { background: #2c5282; }
    </style>
</head>
<body>
<div class="container">
    <h1>Bulletins de Notes — Promotion 2025–2026</h1>

    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/notes/form}"
       style="display:inline-block;margin-bottom:16px;background:#1e3a5f;color:#fff;
            padding:8px 16px;border-radius:4px;text-decoration:none;">
        Ajouter une note
    </a>

    <table>
        <thead>
        <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Groupe</th>
            <th>Filière</th>
            <th>Moyenne</th>
            <th>Mention</th>
            <th>Statut</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${bulletins}"
            th:class="${b.admis} ? 'admis' : 'ajourné'">
            <td th:text="${b.etudiant.nom}">Nom</td>
            <td th:text="${b.etudiant.prenom}">Prénom</td>
            <td th:text="${b.etudiant.groupe}">Groupe</td>
            <td th:text="${b.etudiant.filiere != null ? b.etudiant.filiere.nom : '—'}">Filière</td>
            <td th:text="${#numbers.formatDecimal(b.moyenneGenerale, 1, 2)}">0.00</td>
            <td th:text="${b.mention}">Mention</td>
            <td>
                <span th:if="${b.admis}" class="badge-admis">Admis</span>
                <span th:unless="${b.admis}" class="badge-ajourné">Ajourné</span>
            </td>
            <td>
                <a th:href="@{/bulletins/{id}(id=${b.etudiant.id})}" class="btn-voir">Voir bulletin</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bulletins)}">
            <td colspan="8" style="text-align:center;color:#888;padding:24px;">Aucun étudiant enregistré.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
